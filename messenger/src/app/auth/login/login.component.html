<div class="login-wrapper d-flex align-items-center justify-content-center min-vh-100">
  <mat-card class="login-card shadow-lg">
    <mat-card-header class="justify-content-center mb-3">
      <div class="text-center w-100">
        <mat-icon class="login-icon">chat</mat-icon>
        <mat-card-title class="mt-2">Messenger</mat-card-title>
        <mat-card-subtitle>Личный мессенджер</mat-card-subtitle>
      </div>
    </mat-card-header>

    <mat-card-content>

      <!-- Install banner -->
      @if (install.showInstallButton()) {
        <div class="install-banner mb-3">
          <button mat-raised-button class="install-btn w-100" (click)="onInstallClick()">
            <mat-icon>install_mobile</mat-icon>
            Установить приложение
          </button>

          <!-- iOS инструкция -->
          @if (showIOSGuide()) {
            <div class="ios-guide mt-2 p-3 rounded">
              <p class="mb-2 fw-bold small">Как установить на iPhone / iPad:</p>
              <ol class="mb-0 small ps-3">
                <li>Нажми <mat-icon class="ios-icon">ios_share</mat-icon> «Поделиться» внизу Safari</li>
                <li>Выбери <strong>«На экран Домой»</strong></li>
                <li>Нажми <strong>«Добавить»</strong></li>
              </ol>
            </div>
          }
        </div>
        <mat-divider class="mb-3"></mat-divider>
      }

      <!-- Login form -->
      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>PIN-код</mat-label>
          <input
            matInput
            [(ngModel)]="pin"
            name="pin"
            [type]="hide() ? 'password' : 'text'"
            inputmode="numeric"
            pattern="[0-9]*"
            maxlength="6"
            required
            autocomplete="off"
            placeholder="Введите PIN"
          />
          <button mat-icon-button matSuffix type="button" (click)="toggleHide()">
            <mat-icon>{{ hide() ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        @if (error()) {
          <div class="alert alert-danger py-2 text-center small">{{ error() }}</div>
        }

        <button mat-raised-button color="primary" type="submit" class="w-100 mt-2" [disabled]="!pin">
          Войти
        </button>
      </form>

    </mat-card-content>
  </mat-card>
</div>
